version: '3.8'

services:
  db:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017" # Para permitir debuggear con Compass/Studio 3T
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: medicitas-backend
    ports:
      - "3000:3000"
    environment:
      - MONGO_URI=mongodb://db:27017/gestion_citas
      - PORT=3000
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: medicitas-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo-data:
